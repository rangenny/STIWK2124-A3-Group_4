name: STIWK2124 Group 4 Web Engineering CI Matrix

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-validation:
    name: Spring Boot Core Validation Suite
    runs-on: ubuntu-latest

    services:
      mysql-service:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: arl_db
          MYSQL_ROOT_PASSWORD: newpassword
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Clone Repository Link Source Elements
      uses: actions/checkout@v4

    - name: Provision Java Development Runtime Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Backend Junit Test Verification Layers
      run: mvn clean test
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/arl_db
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: newpassword

    - name: Build Production Distribution Artifact Assembly
      run: mvn package -DskipTests

  frontend-validation:
    name: Angular UI Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository Link Source Elements
      uses: actions/checkout@v4

    - name: Provision Node Runtime Engine Ecosystem
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './arl-frontend/package-lock.json'

    - name: Install Frontend Package Matrix Manifest Dependencies
      run: |
        cd arl-frontend
        npm ci

    - name: Run Angular Front End Specification Unit Tests
      run: |
        cd arl-frontend
        npm run test -- --watch=false --browsers=ChromeHeadless