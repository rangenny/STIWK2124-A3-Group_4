name: STIWK2124 CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Phua@0809
          MYSQL_DATABASE: arl_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -ppassword" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25' 
        distribution: 'oracle'

    - name: Run Backend Tests & Build
      run: mvn clean test package
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/arl_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: Phua@0809

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./arl-frontend
      run: npm install

    - name: Install Playwright for Vitest
      working-directory: ./arl-frontend
      run: npm install -D @vitest/browser-playwright playwright

    # FIX 3: Changed ChromeHeadless to chromium
    - name: Run Angular Test Suite
      working-directory: ./arl-frontend
      run: npm test -- --watch=false --browsers=chromium
