name: STIWK2124 CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    # 1. Start the MySQL Service
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Phua@0809
          MYSQL_DATABASE: arl_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -ppassword" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: maven

    # 2. Run Backend JUnit Tests and Build Production JAR
    - name: Run Backend Tests & Build
      run: mvn clean test package

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Install dependencies and run Angular tests
    - name: Install Frontend Dependencies
      working-directory: ./arl-frontend
      run: npm install

    - name: Run Angular Test Suite
      working-directory: ./arl-frontend
      run: npm test -- --watch=false --browsers=ChromeHeadless
